name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish-npm:
    permissions:
      contents: read
      # Mints the OIDC token npm trusted publishing exchanges for publish
      # credentials — no NPM_TOKEN secret involved.
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      # Guest JS bindings
      - run: pnpm install
      - run: pnpm build
      - run: npm publish

      # MCP server CLI
      - run: cd mcp-server-ts && pnpm install && pnpm build
      - run: cd mcp-server-ts && npm publish

  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - run: gh release create ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
