name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish-npm:
    permissions:
      contents: read
      # Mints the OIDC token npm trusted publishing exchanges for publish
      # credentials — no NPM_TOKEN secret involved.
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # No registry-url here: it writes an .npmrc with an _authToken
      # placeholder that shadows OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest

      # Guest JS bindings
      - run: pnpm install
      - run: pnpm build
      - run: npm publish

      # MCP server CLI
      - run: cd mcp-server-ts && pnpm install && pnpm build
      - run: cd mcp-server-ts && npm publish

  github-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Use the tag's CHANGELOG.md section as the release body; fall back to
      # auto-generated notes when no matching section exists.
      - run: |
          awk -v ver="${GITHUB_REF_NAME#v}" '
            /^## / { p = index($0, "[" ver "]") > 0; next }
            p' CHANGELOG.md > /tmp/release-notes.md
          if [ -s /tmp/release-notes.md ]; then
            gh release create "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
